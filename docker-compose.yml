version: "3.9"

services:
  frontend:
    build: ./frontend
    ports:
      - "5173:4173"

  auth-service:
    build: ./AuthService
    environment:
      # MATCHED the password and used the service name 'auth-db' as the server
      - ConnectionStrings__DefaultConnection=Server=auth-db;Database=AuthDb;User Id=sa;Password=JaiShreeShyam@123;TrustServerCertificate=True
    ports:
      - "5001:8080"
    depends_on:
      - auth-db

  main-service:
    build: ./MainService
    ports:
      - "5002:8080"
    depends_on:
      - auth-service

  auth-db:
    image: mcr.microsoft.com/mssql/server:2022-latest
    environment:
      - ACCEPT_EULA=Y
      - MSSQL_SA_PASSWORD=JaiShreeShyam@123
    ports:
      - "1434:1433"
    volumes:
      - sql_data:/var/opt/mssql
      # Note: Ensure init.sql exists in your folder if you use this line
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql

volumes:
  sql_data: